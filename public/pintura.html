<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Pintura</title>
    <link rel="stylesheet" href="css/pintura.css">
</head>

<body>

    <div class="topbar">

        <div class="chip">
            <div class="chip-label">AVIÃO</div>
            <div id="aviaoTitulo" class="chip-value"></div>
        </div>

        <div class="chip highlight">
            <div class="chip-label">VISTA</div>
            <div id="vista" class="chip-value"></div>
        </div>

        <div class="chip">
            <div class="chip-label">TEMPO</div>
            <div id="tempo" class="chip-value">0</div>
        </div>

    </div>
    <div class="bottom">

        <div class="progresso-box">

            <div class="progresso-text">
                <span>Progresso</span>
                <span id="progresso">0%</span>
            </div>

            <div class="progresso-bar">
                <div id="progresso-fill"></div>
            </div>

        </div>

    </div>

    <div class="game-area">

    <div id="carousel" class="carousel">

        <div class="slide active">
            <canvas id="canvas"></canvas>
        </div>

    </div>

</div>

    <script src="js/pintura.js"></script>

</body>

</html>
