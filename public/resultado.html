<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Resultado</title>
</head>
<link rel="stylesheet" href="css/resultado.css">

<body>
    <div id="resultado"></div>
    <div class="result-card">

        <div class="result-icon">🎉</div>

        <h1 class="result-title">
            Missão Concluída
        </h1>


        <p id="aviao" class="aircraft-name"></p>

        <div id="tempo" class="result-time"></div>

        <div class="medal">🏅</div>

        <p class="result-message">
            Excelente trabalho!
        </p>

        <button class="play-again" onclick="jogarNovamente()">
            Jogar Novamente
        </button>

    </div>

    <script>

        const r =
            JSON.parse(
                localStorage.getItem("resultado")
            );

        if (r) {

            document.getElementById("aviao").textContent =
                `✈ ${r.aviao}`;

            document.getElementById("tempo").textContent =
                `${r.tempo} segundos`;

        }

        function jogarNovamente() {

        localStorage.removeItem("resultado");
        localStorage.removeItem("inicio");
        localStorage.removeItem("aviao");

        location.href = "index.html";
        }

    </script>
</body>

</html>
