<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Pintar Aviões</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <div class="bg"></div>

    <div class="card">

        <div class="logo">✈️</div>

        <h1>Pintar Aviões</h1>

        <p class="subtitle">
            Escolhe o teu avião e começa o desafio
        </p>

        <div class="form">

            <div class="avioes-grid">

                <div class="aviao-card" data-aviao="C130">
                    <img src="assets/C130/capa.jpg">
                    <h3>C-130</h3>
                </div>

                <div class="aviao-card selected" data-aviao="F16">
                    <img src="assets/F16/capa.jpg">
                    <h3>F-16</h3>
                </div>

                <div class="aviao-card" data-aviao="KC390">
                    <img src="assets/KC390/capa.jpeg">
                    <h3>KC-390</h3>
                </div>

            </div>
            <br>
            <button onclick="start()">
                Começar missão
            </button>

        </div>

        <div class="footer">
            🎨 jogo de pintura interativa
        </div>

    </div>

    <script>
        function start() {
            const aviao = aviaoSelecionado;

            if (!aviao) {
                alert("Escolhe um avião");
                return;
            }
            
            localStorage.setItem("aviao", aviao);
            localStorage.setItem("inicio", Date.now());

            location.href = "pintura.html";
        }

        let aviaoSelecionado = null;

        document
            .querySelectorAll(".aviao-card")
            .forEach(card => {

                card.addEventListener("click", () => {

                    console.log("Clique:", card.dataset.aviao);

                    document
                        .querySelectorAll(".aviao-card")
                        .forEach(c =>
                            c.classList.remove("selected")
                        );

                    card.classList.add("selected");

                    aviaoSelecionado =
                        card.dataset.aviao;
                });
            });
    </script>

</body>

</html>
